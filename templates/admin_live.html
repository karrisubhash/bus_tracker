<!DOCTYPE html>
<html>
<head>
<title>Admin Live Bus Tracking</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
width:100%;
}

.title{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:white;
padding:10px 20px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
z-index:1000;
font-weight:bold;
}
</style>

</head>

<body>

<div class="title">
🚌 College Bus Live Tracking
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ================= MAP =================
const STOP = [17.91984, 83.41716];
const map = L.map('map').setView([17.721,83.301],14)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{ maxZoom:19 }
).addTo(map)


// ================= BUS ICON =================

const normalBusIcon = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/174/174237.png",
iconSize:[40,40],
iconAnchor:[20,20]
})
const issueBusIcon = L.icon({
  iconUrl: "https://cdn-icons-png.flaticon.com/512/564/564619.png",
  iconSize: [40,40],
  iconAnchor: [20,20],

// ================= BUS STORAGE =================

const buses = {}
const routes ={}


// ================= UPDATE BUS =================
function updateBus(data){

  const id = data.trip_id
  const lat = data.lat
  const lon = data.lon

  if(!lat || !lon) return

  const busPosition = [lat, lon]

  const icon = data.has_issue ? issueBusIcon : normalBusIcon

  // ================= CREATE MARKER =================

  if(!buses[id]){

    const marker = L.marker(busPosition,{icon:icon})
    .addTo(map)

    marker.bindPopup(
      "<b>Bus:</b> "+data.bus+
      "<br><b>Route:</b> "+data.route+
      "<br><b>Driver:</b> "+data.driver
    )

    buses[id] = marker

    map.panTo(busPosition)

  }else{

    buses[id].setLatLng(busPosition)
    buses[id].setIcon(icon)

  }

  // ================= DRAW POLYLINE =================

  const routeCoords = [
    busPosition,
    STOP
  ]

  if(!routes[id]){

    routes[id] = L.polyline(routeCoords,{
      color:"blue",
      weight:4
    }).addTo(map)

  }else{

    routes[id].setLatLngs(routeCoords)

  }

}

// ================= WEBSOCKET =================

let socket

function connectSocket(){

const protocol = window.location.protocol === "https:" ? "wss://" : "ws://"

socket = new WebSocket(
protocol + window.location.host + "/ws/bus/"
)

socket.onopen = function(){
console.log("WebSocket Connected")
}

socket.onmessage = function(event){

const data = JSON.parse(event.data)

updateBus(data)

}

socket.onclose = function(){

console.log("WebSocket disconnected, reconnecting...")

setTimeout(connectSocket,3000)

}

}

connectSocket()



// ================= POLLING BACKUP =================

async function fallbackPolling(){

try{

const res = await fetch("/api/admin/live-locations/")
const data = await res.json()

data.forEach(bus=>{
updateBus(bus)
})

}catch(e){
console.log("Polling error",e)
}

}

// run every 5 seconds
setInterval(fallbackPolling,5000)

</script>

</body>
</html>
