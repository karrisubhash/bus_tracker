<!DOCTYPE html><html>
<head>
<title>Admin – Live Bus Monitoring</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
}

header{
background:#0f172a;
color:white;
padding:12px 18px;
font-size:18px;
font-weight:bold;
}

#map{
height:calc(100vh - 50px);
}
</style></head>
<body><header>🛠 Admin Live Bus Monitoring</header><div id="map"></div><script>

/* ================= MAP ================= */

const map = L.map("map").setView([17.91925,83.42445],13);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{ attribution: "© OpenStreetMap contributors" }
).addTo(map);

/* ================= BUS ICON ================= */

const busIcon = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/684/684908.png",
iconSize:[40,40],
iconAnchor:[20,20]
});

/* ================= STATE ================= */

const markers = {};
const polylines = {};

/* ================= SMOOTH ANIMATION ================= */

function animateMarker(marker,newPos,duration=1000){

const start = marker.getLatLng();
const startTime = performance.now();

function animate(time){

const progress = Math.min((time-startTime)/duration,1);

const lat = start.lat + (newPos.lat-start.lat)*progress;
const lng = start.lng + (newPos.lng-start.lng)*progress;

marker.setLatLng([lat,lng]);

if(progress<1){
requestAnimationFrame(animate);
}

}

requestAnimationFrame(animate);

}

/* ================= WEBSOCKET ================= */

function connectSocket(){

const protocol = location.protocol === "https:" ? "wss" : "ws";

const socket = new WebSocket(
protocol + "://" + location.host + "/ws/bus/"
);

/* ===== CONNECTED ===== */

socket.onopen = function(){
console.log("WebSocket Connected");
};

/* ===== RECEIVE DATA ===== */

socket.onmessage = function(event){

const data = JSON.parse(event.data);

const tripId = data.trip_id;
const lat = data.lat;
const lon = data.lon;

const position = L.latLng(lat,lon);

/* ===== CREATE MARKER ===== */

if(!markers[tripId]){

markers[tripId] = L.marker(position,{icon:busIcon})
.addTo(map)
.bindPopup("Bus ID: "+tripId);

polylines[tripId] = L.polyline([position],{
color:"blue",
weight:5
}).addTo(map);

map.setView(position,15);

}

/* ===== MOVE MARKER ===== */

else{

animateMarker(markers[tripId],position);

}

/* ===== UPDATE ROUTE ===== */

polylines[tripId].addLatLng(position);

};

/* ===== ERROR ===== */

socket.onerror = function(error){
console.log("WebSocket Error:",error);
};

/* ===== RECONNECT ===== */

socket.onclose = function(){
console.log("WebSocket Closed... reconnecting");
setTimeout(connectSocket,2000);
};

}

connectSocket();

</script></body>
</html>
