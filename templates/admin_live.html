<!DOCTYPE html>
<html>
<head>

<title>Admin Live Bus Tracking</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
padding:0;
font-family:Arial;
}

#map{
height:100vh;
width:100%;
}

.title{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
background:white;
padding:10px 20px;
border-radius:10px;
z-index:1000;
font-weight:bold;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<div class="title">
🚌 Live Bus Tracking Dashboard
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// =========================
// MAP INITIALIZATION
// =========================

const map = L.map('map').setView([17.721,83.301],13)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map)


// =========================
// BUS STORAGE
// =========================

const buses = {}
const routes = {}



// =========================
// WEBSOCKET CONNECTION
// =========================

function connectSocket(){

let protocol = window.location.protocol === "https:" ? "wss" : "ws"

const socket = new WebSocket(
protocol + "://" + window.location.host + "/ws/bus/"
)


// =========================
// CONNECT
// =========================

socket.onopen = function(){

console.log("WebSocket connected")

}


// =========================
// DISCONNECT
// =========================

socket.onclose = function(){

console.log("WebSocket disconnected")

setTimeout(connectSocket,3000)

}


// =========================
// RECEIVE DATA
// =========================

socket.onmessage = function(event){

let data = JSON.parse(event.data)

console.log("Bus update:",data)

let trip_id = data.trip_id
let lat = data.lat
let lon = data.lon
let bus = data.bus


// =========================
// CREATE BUS MARKER
// =========================

if(!buses[trip_id]){

let marker = L.marker([lat,lon]).addTo(map)

marker.bindPopup(
"<b>Bus:</b> "+bus+
"<br><b>Trip:</b> "+trip_id
)

buses[trip_id] = marker


// create route line

routes[trip_id] = L.polyline(
[[lat,lon]],
{
color:"blue",
weight:4
}
).addTo(map)

}


// =========================
// MOVE BUS
// =========================

buses[trip_id].setLatLng([lat,lon])


// =========================
// DRAW PATH
// =========================

routes[trip_id].addLatLng([lat,lon])


}


// =========================
// ERROR
// =========================

socket.onerror = function(error){

console.log("WebSocket error",error)

}

}

connectSocket()

</script>

</body>
</html>
