<!DOCTYPE html>
<html>
<head>
  <title>Admin – Live Bus Monitoring</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    header {
      background: #0f172a;
      color: white;
      padding: 12px 18px;
      font-size: 18px;
      font-weight: bold;
    }
    #map { height: calc(100vh - 50px); }
  </style>
</head>
<body>

<header>🛠 Admin Live Bus Monitoring</header>
<div id="map"></div>

<script>

/* ================= AUTH ================= */

const token = localStorage.getItem("admin_token");

if (!token) {
  alert("Admin login required");
  window.location.href = "/admin/login/";
}

/* ================= MAP ================= */

const map = L.map("map").setView([17.91925, 83.42445], 13);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap"
}).addTo(map);

/* ================= ICONS ================= */

const normalIcon = L.icon({
  iconUrl: "https://cdn-icons-png.flaticon.com/512/174/174237.png",
  iconSize: [50, 50],
  iconAnchor: [25, 25],
});

const issueIcon = L.icon({
  iconUrl: "https://cdn-icons-png.flaticon.com/512/3205/3205237.png",
  iconSize: [50, 50],
  iconAnchor: [25, 25],
});

/* ================= STATE ================= */

const markers = {};
let firstLoad = true;

/* ================= SMOOTH ANIMATION ================= */

function animateMarker(marker, newLatLng, duration = 800) {
  const start = marker.getLatLng();
  const startTime = performance.now();

  function animate(time) {
    const progress = Math.min((time - startTime) / duration, 1);

    const lat = start.lat + (newLatLng.lat - start.lat) * progress;
    const lng = start.lng + (newLatLng.lng - start.lng) * progress;

    marker.setLatLng([lat, lng]);

    if (progress < 1) {
      requestAnimationFrame(animate);
    }
  }

  requestAnimationFrame(animate);
}

/* ================= LOAD LIVE BUSES ================= */

async function loadLiveBuses() {
  try {
    const res = await fetch("/api/admin/live-locations/", {
      headers: { Authorization: "Bearer " + token }
    });

    if (!res.ok) {
      console.error("API error:", res.status);
      return;
    }

    const buses = await res.json();

    if (!Array.isArray(buses) || buses.length === 0) return;

    const bounds = L.latLngBounds();

    buses.forEach(bus => {
      const tripId = bus.trip_id;
      const busPos = L.latLng(bus.lat, bus.lon);
      const icon = bus.has_issue ? issueIcon : normalIcon;

      if (!markers[tripId]) {
        markers[tripId] = L.marker(busPos, { icon })
          .addTo(map)
          .bindPopup(`
            <b>🚌 Bus:</b> ${bus.bus}<br>
            <b>🛣 Route:</b> ${bus.route}<br>
            <b>👨‍✈ Driver:</b> ${bus.driver}<br>
          `);
      } else {
        animateMarker(markers[tripId], busPos);
        markers[tripId].setIcon(icon);
      }

      bounds.extend(busPos);
    });

    if (firstLoad) {
      map.fitBounds(bounds, { padding: [50, 50] });
      firstLoad = false;
    }

  } catch (err) {
    console.error("Live map error:", err);
  }
}

/* ================= AUTO UPDATE ================= */

async function startLiveUpdates() {
  await loadLiveBuses();
  setTimeout(startLiveUpdates, 2000);
}

startLiveUpdates();

</script>

</body>
</
