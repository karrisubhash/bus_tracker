<!DOCTYPE html>
<html>
<head>

<title>Admin Live Bus Tracking</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
width:100%;
}

.title{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:white;
padding:10px 20px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
z-index:1000;
font-weight:bold;
}

</style>

</head>

<body>

<div class="title">
🚌 College Bus Live Tracking
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ========================
// MAP SETUP
// ========================

const map = L.map('map').setView([17.721,83.301],13)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{ maxZoom:19 }
).addTo(map)


// ========================
// BUS ICON
// ========================

const busIcon = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/174/174237.png",
iconSize:[35,35],
iconAnchor:[17,35],
popupAnchor:[0,-35]
})


// ========================
// STORE BUS MARKERS
// ========================

const buses = {}



// ========================
// WEBSOCKET CONNECTION
// ========================

function connectSocket(){

const protocol = window.location.protocol === "https:" ? "wss://" : "ws://"

const socket = new WebSocket(
protocol + window.location.host + "/ws/bus/"
)

socket.onopen = function(){
console.log("WebSocket Connected")
}


// ========================
// RECEIVE LIVE BUS DATA
// ========================

socket.onmessage = function(event){

const data = JSON.parse(event.data)

const id = data.trip_id
const lat = data.lat
const lon = data.lon


// CREATE MARKER IF NOT EXISTS

if(!buses[id]){

const marker = L.marker([lat,lon],{icon:busIcon})
.addTo(map)

marker.bindPopup(
"<b>Bus:</b> "+data.bus+
"<br><b>Route:</b> "+data.route+
"<br><b>Driver:</b> "+data.driver
)

buses[id] = marker

}else{

// MOVE BUS MARKER

buses[id].setLatLng([lat,lon])

}

}


// ========================
// ERROR HANDLING
// ========================

socket.onerror = function(error){
console.log("WebSocket Error:",error)
}


// ========================
// AUTO RECONNECT
// ========================

socket.onclose = function(){

console.log("WebSocket disconnected. Reconnecting...")

setTimeout(connectSocket,3000)

}

}


// START CONNECTION

connectSocket()

</script>

</body>

</html>
