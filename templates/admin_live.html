<!DOCTYPE html>
<html>
<head>
<title>Admin – Live Bus Monitoring</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Arial}
header{
background:#0f172a;
color:white;
padding:12px 18px;
font-size:18px;
font-weight:bold
}
#map{height:calc(100vh - 50px)}
</style>
</head>

<body>

<header>🛠 Admin Live Bus Monitoring</header>
<div id="map"></div>

<script>

/* ================= CONFIG ================= */

const BASE_URL="https://college-bus-tracking-system-ri73.onrender.com";

/* ================= AUTH ================= */

const token=localStorage.getItem("admin_token");

if(!token){
alert("Admin login required");
window.location.href="/admin-panel/login/";
}

/* ================= MAP ================= */

const map=L.map("map").setView([17.91925,83.42445],13);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{attribution:"© OpenStreetMap"}
).addTo(map);

/* ================= ICONS ================= */

const normalIcon=L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/684/684908.png",
iconSize:[45,45],
iconAnchor:[22,22]
});

const issueIcon=L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/564/564619.png",
iconSize:[45,45],
iconAnchor:[22,22]
});

/* ================= STATE ================= */

const markers={};
let firstLoad=true;

/* ================= SMOOTH ANIMATION ================= */

function animateMarker(marker,newPos,duration=1000){

const start=marker.getLatLng();
const startTime=performance.now();

function animate(time){

const progress=Math.min((time-startTime)/duration,1);

const lat=start.lat+(newPos.lat-start.lat)*progress;
const lng=start.lng+(newPos.lng-start.lng)*progress;

marker.setLatLng([lat,lng]);

if(progress<1){
requestAnimationFrame(animate);
}

}

requestAnimationFrame(animate);

}

/* ================= LOAD LIVE BUSES ================= */

async function loadLiveBuses(){

try{

const res=await fetch(
BASE_URL+"/api/admin/live-locations/?t="+Date.now(),
{
headers:{Authorization:"Bearer "+token},
cache:"no-store"
}
);

if(!res.ok){
console.log("API ERROR",res.status);
return;
}

const buses=await res.json();

if(!Array.isArray(buses)) return;

const bounds=L.latLngBounds();

buses.forEach(bus=>{

const tripId=bus.trip_id;

/* FORCE NUMBERS (IMPORTANT FIX) */

const lat=parseFloat(bus.lat);
const lon=parseFloat(bus.lon);

const busPos=L.latLng(lat,lon);

const icon=bus.has_issue?issueIcon:normalIcon;

if(!markers[tripId]){

markers[tripId]=L.marker(busPos,{icon})
.addTo(map)
.bindPopup(`
<b>Bus:</b> ${bus.bus}<br>
<b>Route:</b> ${bus.route}<br>
<b>Driver:</b> ${bus.driver}
`);

}else{

animateMarker(markers[tripId],busPos);
markers[tripId].setIcon(icon);

}

bounds.extend(busPos);

});

/* zoom only first time */

if(firstLoad && bounds.isValid()){
map.fitBounds(bounds,{padding:[50,50]});
firstLoad=false;
}

}catch(err){
console.log("MAP ERROR",err);
}

}

/* ================= AUTO UPDATE ================= */

setInterval(loadLiveBuses,2000);

/* first load */

loadLiveBuses();

</script>

</body>
</html>
