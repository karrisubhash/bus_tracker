<!DOCTYPE html>
<html>
<head>

<title>Admin Live Bus Tracking</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
width:100%;
}

.title{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:white;
padding:10px 20px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
z-index:1000;
font-weight:bold;
}

</style>

</head>

<body>

<div class="title">
🚌 College Bus Live Tracking
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/////////////////////////////////////////////////////
// MAP SETUP
/////////////////////////////////////////////////////

const map = L.map("map").setView([17.721,83.301],13)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{ maxZoom:19 }
).addTo(map)


/////////////////////////////////////////////////////
// BUS ICON
/////////////////////////////////////////////////////

const busIcon = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/174/174237.png",
iconSize:[35,35],
iconAnchor:[17,35],
popupAnchor:[0,-35]
})


/////////////////////////////////////////////////////
// STORE BUS MARKERS
/////////////////////////////////////////////////////

const buses = {}


/////////////////////////////////////////////////////
// UPDATE / CREATE BUS MARKER
/////////////////////////////////////////////////////

function updateBus(data){

const id = data.trip_id
const lat = data.lat
const lon = data.lon

if(!lat || !lon) return


if(!buses[id]){

const marker = L.marker([lat,lon],{icon:busIcon})
.addTo(map)

marker.bindPopup(
"<b>Bus:</b> "+data.bus+
"<br><b>Route:</b> "+data.route+
"<br><b>Driver:</b> "+data.driver
)

buses[id] = marker

}else{

buses[id].setLatLng([lat,lon])

}

}


/////////////////////////////////////////////////////
// LOAD CURRENT BUS LOCATIONS (FIRST LOAD)
/////////////////////////////////////////////////////

async function loadInitialBuses(){

try{

const res = await fetch("/api/admin/live-locations/")
const data = await res.json()

data.forEach(updateBus)

}catch(e){

console.log("Initial load error:",e)

}

}


/////////////////////////////////////////////////////
// WEBSOCKET CONNECTION
/////////////////////////////////////////////////////

let socket = null

function connectSocket(){

const protocol = window.location.protocol === "https:" ? "wss://" : "ws://"

const wsUrl = protocol + window.location.host + "/ws/bus/"

console.log("Connecting WebSocket:", wsUrl)

socket = new WebSocket(wsUrl)


socket.onopen = function(){
console.log("WebSocket Connected")
}


socket.onmessage = function(event){

try{

const data = JSON.parse(event.data)

updateBus(data)

}catch(e){

console.log("Bad WebSocket data:",e)

}

}


socket.onerror = function(error){

console.log("WebSocket Error:",error)

}


socket.onclose = function(){

console.log("WebSocket Disconnected. Reconnecting in 3 seconds...")

setTimeout(connectSocket,3000)

}

}


/////////////////////////////////////////////////////
// START SYSTEM
/////////////////////////////////////////////////////

loadInitialBuses()

connectSocket()

</script>

</body>

</html>
