<!DOCTYPE html>
<html>
<head>
<title>Admin Live Bus Tracking</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
width:100%;
}

.title{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:white;
padding:10px 20px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
z-index:1000;
font-weight:bold;
}
</style>
</head>

<body>

<div class="title">
🚌 College Bus Live Tracking
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ================= MAP =================

const map = L.map('map').setView([17.91925,83.42445],13)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)


// ================= ICONS =================

const normalBusIcon = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/174/174237.png",
iconSize:[40,40],
iconAnchor:[20,20]
})

const issueBusIcon = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/3205/3205237.png",
iconSize:[40,40],
iconAnchor:[20,20]
})


// ================= STORAGE =================

const buses = {}
const routes = {}



// ================= LOAD ROUTE =================

async function loadRoute(tripId){

// prevent duplicate route loading
if(routes[tripId]) return

try{

const res = await fetch(`/trips/${tripId}/route-path/`)

if(!res.ok){
console.log("Route API not found for trip",tripId)
return
}

const data = await res.json()

if(!data.path || data.path.length === 0) return

routes[tripId] = L.polyline(data.path,{
color:"#2563eb",
weight:5
}).addTo(map)

}catch(e){
console.log("Route load error",e)
}

}



// ================= UPDATE BUS =================

function updateBus(data){

const id = data.trip_id
const lat = data.lat
const lon = data.lon

if(!lat || !lon) return

const position = [lat,lon]

const icon = data.has_issue ? issueBusIcon : normalBusIcon


// CREATE MARKER

if(!buses[id]){

const marker = L.marker(position,{icon:icon})
.addTo(map)

marker.bindPopup(
"<b>Bus:</b> "+data.bus+
"<br><b>Route:</b> "+data.route+
"<br><b>Driver:</b> "+data.driver
)

buses[id] = marker

map.panTo(position)

// load route only once
loadRoute(id)

}else{

buses[id].setLatLng(position)
buses[id].setIcon(icon)

}

}



// ================= WEBSOCKET =================

let socket

function connectSocket(){

const protocol = window.location.protocol === "https:" ? "wss://" : "ws://"

socket = new WebSocket(
protocol + window.location.host + "/ws/bus/"
)

socket.onopen = () => console.log("WebSocket Connected")

socket.onmessage = function(event){

const data = JSON.parse(event.data)

updateBus(data)

}

socket.onclose = function(){

console.log("WebSocket disconnected")

setTimeout(connectSocket,3000)

}

socket.onerror = function(error){
console.log("WebSocket error",error)
}

}

connectSocket()



// ================= POLLING BACKUP =================

async function fallbackPolling(){

try{

const res = await fetch("/api/admin/live-locations/")

if(!res.ok) return

const data = await res.json()

data.forEach(bus=>{
updateBus(bus)
})

}catch(e){
console.log("Polling error",e)
}

}

setInterval(fallbackPolling,5000)

</script>

</body>
</html>
