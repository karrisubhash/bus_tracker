<!DOCTYPE html>
<html>
<head>

<title>Admin Live Bus Tracking</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
width:100%;
}

.title{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:white;
padding:10px 20px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
z-index:1000;
font-weight:bold;
}

</style>

</head>

<body>

<div class="title">
🚌 College Bus Live Tracking
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ========================
// MAP SETUP
// ========================

const map = L.map('map').setView([17.721,83.301],13)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{ maxZoom:19 }
).addTo(map)


// ========================
// BUS ICON
// ========================

const busIcon = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512.174/174237.png",
iconSize:[35,35],
iconAnchor:[17,35],
popupAnchor:[0,-35]
})


// ========================
// STORE BUS MARKERS
// ========================

const buses = {}



// ========================
// FETCH BUS LOCATIONS
// ========================

async function loadBusLocations(){

try{

const res = await fetch("/api/admin/live-locations/")

const data = await res.json()


data.forEach(bus => {

const id = bus.trip_id
const lat = bus.lat
const lon = bus.lon


// create marker if not exists

if(!buses[id]){

const marker = L.marker([lat,lon],{icon:busIcon})
.addTo(map)

marker.bindPopup(
"<b>Bus:</b> "+bus.bus+
"<br><b>Route:</b> "+bus.route+
"<br><b>Driver:</b> "+bus.driver
)

buses[id] = marker

}else{

// move marker

buses[id].setLatLng([lat,lon])

}

})


}catch(e){

console.log("Error loading buses",e)

}

}



// ========================
// UPDATE EVERY 3 SECONDS
// ========================

loadBusLocations()

setInterval(loadBusLocations,3000)


</script>

</body>

</html>
