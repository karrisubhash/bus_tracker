<!DOCTYPE html>
<html>
<head>
<title>Admin Live Bus Tracking</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>

<style>
body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
width:100%;
}

.title{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:white;
padding:10px 20px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
z-index:1000;
font-weight:bold;
}
</style>
</head>

<body>

<div class="title">
🚌 College Bus Live Tracking
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<script>

// ================= MAP =================

const STOP = [17.91984,83.41716]

const map = L.map('map').setView([17.721,83.301],14)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)


// ================= ICONS =================

const normalBusIcon = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/174/174237.png",
iconSize:[40,40],
iconAnchor:[20,20]
})

const issueBusIcon = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/3205/3205237.png",
iconSize:[40,40],
iconAnchor:[20,20]
})


// ================= STORAGE =================

const buses = {}
const routes = {}
const lastRouteUpdate = {}


// ================= UPDATE BUS =================

function updateBus(data){

const id = data.trip_id
const lat = data.lat
const lon = data.lon

if(!lat || !lon) return

const position = [lat,lon]

const icon = data.has_issue ? issueBusIcon : normalBusIcon


// ---------- MARKER ----------

if(!buses[id]){

const marker = L.marker(position,{icon:icon}).addTo(map)

marker.bindPopup(
"<b>Bus:</b> "+data.bus+
"<br><b>Route:</b> "+data.route+
"<br><b>Driver:</b> "+data.driver
)

buses[id] = marker
map.panTo(position)

}else{

buses[id].setLatLng(position)
buses[id].setIcon(icon)

}


// ---------- ROAD ROUTE ----------

const now = Date.now()

if(!routes[id]){

routes[id] = L.Routing.control({

waypoints:[
L.latLng(lat,lon),
L.latLng(STOP[0],STOP[1])
],

router:L.Routing.osrmv1({
serviceUrl:"https://router.project-osrm.org/route/v1"
}),

lineOptions:{
styles:[{color:"#2563eb",weight:5}]
},

addWaypoints:false,
draggableWaypoints:false,
fitSelectedRoutes:false,
show:false,
createMarker:()=>null

}).addTo(map)

lastRouteUpdate[id] = now

}else{

// update route every 10 seconds only
if(now - lastRouteUpdate[id] > 10000){

routes[id].setWaypoints([
L.latLng(lat,lon),
L.latLng(STOP[0],STOP[1])
])

lastRouteUpdate[id] = now

}

}

}


// ================= WEBSOCKET =================

let socket

function connectSocket(){

const protocol = window.location.protocol === "https:" ? "wss://" : "ws://"

socket = new WebSocket(
protocol + window.location.host + "/ws/bus/"
)

socket.onopen = () => console.log("WebSocket Connected")

socket.onmessage = (event)=>{
const data = JSON.parse(event.data)
updateBus(data)
}

socket.onclose = ()=>{
console.log("WebSocket disconnected")
setTimeout(connectSocket,3000)
}

}

connectSocket()


// ================= POLLING BACKUP =================

async function fallbackPolling(){

try{

const res = await fetch("/api/admin/live-locations/")
const data = await res.json()

data.forEach(updateBus)

}catch(e){
console.log("Polling error",e)
}

}

setInterval(fallbackPolling,3000)

</script>

</body>
</html>
