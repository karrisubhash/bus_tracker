<!DOCTYPE html>
<html>
<head>
<title>Admin – Live Bus Tracking</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{
margin:0;
font-family:Arial;
}

header{
background:#0f172a;
color:white;
padding:12px 18px;
font-size:18px;
font-weight:bold;
}

#map{
height:calc(100vh - 50px);
}
</style>

</head>
<body>

<header>🚌 College Bus Live Monitoring</header>

<div id="map"></div>

<script>

/* ================= MAP ================= */

const map = L.map("map").setView([17.91925,83.42445],13);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
attribution:"© OpenStreetMap"
}).addTo(map);


/* ================= ICONS ================= */

const busIcon = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/174/174237.png",
iconSize:[40,40],
iconAnchor:[20,20]
});

const issueIcon = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/3205/3205237.png",
iconSize:[40,40],
iconAnchor:[20,20]
});


/* ================= STATE ================= */

let markers = {};
let polylines = {};


/* ================= SMOOTH MOVE ================= */

function animateMarker(marker,newLatLng,duration=1000){

const start = marker.getLatLng();
const startTime = performance.now();

function animate(time){

const progress = Math.min(
(time-startTime)/duration,
1
);

const lat =
start.lat +
(newLatLng.lat-start.lat)*progress;

const lng =
start.lng +
(newLatLng.lng-start.lng)*progress;

marker.setLatLng([lat,lng]);

if(progress<1){
requestAnimationFrame(animate);
}

}

requestAnimationFrame(animate);

}


/* ================= WEBSOCKET ================= */

const socket = new WebSocket(
"wss://"+window.location.host+"/ws/bus/"
);


socket.onopen = function(){
console.log("WebSocket Connected");
};


socket.onmessage = function(event){

const data = JSON.parse(event.data);

console.log("Bus Update:",data);


const tripId = data.trip_id;
const lat = data.lat;
const lon = data.lon;

const position = [lat,lon];

const icon = data.has_issue
? issueIcon
: busIcon;


/* ================= MARKER ================= */

if(!markers[tripId]){

markers[tripId] =
L.marker(position,{icon:icon})
.addTo(map)
.bindPopup(
"<b>Bus:</b> "+data.bus+
"<br><b>Driver:</b> "+data.driver+
"<br><b>Route:</b> "+data.route
);

}
else{

animateMarker(
markers[tripId],
L.latLng(lat,lon)
);

markers[tripId].setIcon(icon);

}


/* ================= ROUTE LINE ================= */

if(!polylines[tripId]){

polylines[tripId] =
L.polyline([position],
{
color:"blue",
weight:4
}).addTo(map);

}
else{

polylines[tripId].addLatLng(position);

}

};


socket.onclose = function(){

console.log("WebSocket Closed");
setTimeout(connectSocket,3000);

};


socket.onerror = function(e){
console.log("WebSocket Error",e);
};


</script>

</body>
</html>
